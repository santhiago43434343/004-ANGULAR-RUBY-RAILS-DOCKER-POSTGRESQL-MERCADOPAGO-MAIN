<div class="max-w-4xl mx-auto p-4">
  <h2 class="text-2xl font-black mb-6 border-b-4 border-indigo-500 inline-block">Forma de Pagamento</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    
    <label 
      [class.border-blue-500]="metodoSelecionado === 'mercadopago'"
      [class.bg-blue-50]="metodoSelecionado === 'mercadopago'"
      class="flex items-center gap-3 cursor-pointer p-4 border-2 rounded-2xl hover:shadow-md transition-all">
      <input type="radio" name="metodo" [(ngModel)]="metodoSelecionado" value="mercadopago" (change)="paypalRendered = false" class="w-5 h-5 text-blue-600" />
      <div class="flex flex-col">
        <span class="font-black text-blue-700">Mercado Pago</span>
        <span class="text-xs text-gray-500">Cartão, Pix ou Boleto</span>
      </div>
      <span class="ml-auto text-2xl">💳</span>
    </label>

    <label 
      [class.border-indigo-500]="metodoSelecionado === 'pix'"
      [class.bg-indigo-50]="metodoSelecionado === 'pix'"
      class="flex items-center gap-3 cursor-pointer p-4 border-2 rounded-2xl hover:shadow-md transition-all">
      <input type="radio" name="metodo" [(ngModel)]="metodoSelecionado" value="pix" (change)="paypalRendered = false" class="w-5 h-5 text-indigo-600" />
      <div class="flex flex-col">
        <span class="font-bold text-gray-800">Pix Direto</span>
        <span class="text-xs text-gray-500">Aprovação instantânea</span>
      </div>
      <span class="ml-auto text-2xl">📱</span>
    </label>

    <label 
      [class.border-indigo-500]="metodoSelecionado === 'cartao'"
      [class.bg-indigo-50]="metodoSelecionado === 'cartao'"
      class="flex items-center gap-3 cursor-pointer p-4 border-2 rounded-2xl hover:shadow-md transition-all">
      <input type="radio" name="metodo" [(ngModel)]="metodoSelecionado" value="cartao" (change)="paypalRendered = false" class="w-5 h-5 text-indigo-600" />
      <div class="flex flex-col">
        <span class="font-bold text-gray-800">Cartão de Crédito</span>
        <span class="text-xs text-gray-500">Até 12x s/ juros</span>
      </div>
      <span class="ml-auto text-2xl">🛒</span>
    </label>

    <label 
      [class.border-yellow-500]="metodoSelecionado === 'paypal'"
      [class.bg-yellow-50]="metodoSelecionado === 'paypal'"
      class="flex items-center gap-3 cursor-pointer p-4 border-2 rounded-2xl hover:shadow-md transition-all">
      <input type="radio" name="metodo" [(ngModel)]="metodoSelecionado" value="paypal" (change)="paypalRendered = false" class="w-5 h-5 text-yellow-600" />
      <div class="flex flex-col">
        <span class="font-bold text-gray-800">PayPal</span>
        <span class="text-xs text-gray-500">Pagamento internacional</span>
      </div>
      <span class="ml-auto text-2xl">🅿️</span>
    </label>

  </div>

  <p class="text-sm text-gray-400 mt-4 italic">Método selecionado: <span class="font-bold uppercase text-indigo-600">{{ metodoSelecionado }}</span></p>

  <div *ngIf="metodoSelecionado === 'cartao'" class="mt-6 p-6 bg-white border-2 border-gray-100 rounded-3xl shadow-inner space-y-4">
    <h3 class="font-bold text-gray-700 mb-2">Dados do Cartão</h3>
    <div class="space-y-3">
      <input type="text" [(ngModel)]="dadosPagamento.numero" placeholder="Número do Cartão" class="w-full border-2 border-gray-100 px-4 py-3 rounded-xl focus:border-indigo-500 outline-none transition-all" />
      <div class="flex gap-3">
        <input type="text" [(ngModel)]="dadosPagamento.validade" placeholder="MM/AA" class="w-1/2 border-2 border-gray-100 px-4 py-3 rounded-xl focus:border-indigo-500 outline-none transition-all" />
        <input type="text" [(ngModel)]="dadosPagamento.cvv" placeholder="CVV" class="w-1/2 border-2 border-gray-100 px-4 py-3 rounded-xl focus:border-indigo-500 outline-none transition-all" />
      </div>
    </div>
  </div>

  <div *ngIf="metodoSelecionado === 'pix'" class="mt-6 p-6 bg-indigo-50 rounded-3xl border-2 border-indigo-100 text-center">
    <p class="text-indigo-800 font-bold mb-2">Pague via PIX na próxima tela</p>
    <p class="text-xs text-indigo-600">O código "Copia e Cola" será gerado ao finalizar o pedido.</p>
  </div>

  <div *ngIf="metodoSelecionado === 'mercadopago'" class="mt-6 p-6 bg-blue-600 rounded-3xl text-white shadow-lg animate-pulse">
    <div class="flex items-center gap-4">
      <span class="text-3xl">🛡️</span>
      <div>
        <p class="font-black text-lg">Ambiente Seguro</p>
        <p class="text-sm opacity-90">Ao clicar em continuar, você será levado ao checkout oficial do Mercado Pago para concluir o pagamento.</p>
      </div>
    </div>
  </div>

  <div *ngIf="metodoSelecionado === 'paypal'" class="mt-6 p-4 bg-gray-50 rounded-3xl border-2 border-dashed border-gray-200">
    <div id="paypal-button-container"></div>
  </div>

  <div class="flex justify-between items-center mt-10">
    <button (click)="goBack()" class="text-gray-500 hover:text-gray-800 font-bold px-6 py-2 transition-colors">
      ← Voltar
    </button>
    
    <button 
      *ngIf="metodoSelecionado !== 'paypal'" 
      (click)="continuar()" 
      [disabled]="!metodoSelecionado"
      class="bg-green-500 hover:bg-green-600 disabled:bg-gray-300 text-white text-lg font-black px-10 py-3 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
      Continuar
    </button>
  </div>
</div>
