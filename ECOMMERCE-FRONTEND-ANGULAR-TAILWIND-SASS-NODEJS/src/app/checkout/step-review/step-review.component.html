<div class="max-w-4xl mx-auto p-4">
  <h2 class="text-2xl font-black mb-6 border-b-4 border-indigo-500 inline-block">Revisão</h2>

  <div class="space-y-4 mb-8">
    <div *ngFor="let item of orderData?.cart" class="flex items-center gap-4 border p-4 rounded-2xl bg-white shadow-sm">
      <img [src]="item.imagem" class="w-16 h-16 object-cover rounded-xl" />
      <div class="flex-1">
        <p class="font-bold text-gray-800">{{ item.nome }}</p>
        <p class="text-red-500 font-black">R$ {{ item.preco | number:'1.2-2' }}</p>
      </div>
    </div>
  </div>

  <div class="flex flex-wrap gap-4 mb-10 bg-gray-50 p-6 rounded-3xl items-center shadow-inner">
    <button (click)="back.emit()" class="bg-gray-200 hover:bg-gray-300 px-6 py-2 rounded-xl font-bold transition-all">
      Voltar
    </button>
    
    <button (click)="concluirPedido()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl font-bold">
      Finalizar Pedido
    </button>

    <button (click)="listarPedidos()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl font-bold">
      Atualizar Lista
    </button>

    <div id="paypal-button-container" class="w-full md:w-64 min-h-[50px]"></div>
  </div>

  <div *ngIf="listaDePedidos.length > 0" class="mt-8">
    <h3 class="text-xl font-black mb-6 italic text-gray-700">Meus Pedidos no Rails</h3>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div *ngFor="let p of listaDePedidos" class="flex bg-white border-2 border-gray-100 rounded-2xl overflow-hidden shadow-sm">
        <div class="flex-1 p-4">
          <div class="flex justify-between items-center mb-2">
            <span class="text-[10px] font-black text-gray-400 uppercase">ID #{{ p.id }}</span>
            <span [ngClass]="{
            'bg-green-100 text-green-700 border border-green-200': p.status?.toLowerCase() === 'pago',
            'bg-yellow-100 text-yellow-700 border border-yellow-200': p.status?.toLowerCase() === 'pendente',
            'bg-red-100 text-red-700 border border-red-200': p.status?.toLowerCase() === 'cancelado'
            }" class="text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">
              {{ p.status }}
            </span>
          </div>
          <p class="text-xs text-gray-500 italic line-clamp-1 mb-2">{{ p.cart }}</p>
          <p class="text-lg font-black text-green-600">R$ {{ p.total | number:'1.2-2' }}</p>
        </div>

        <div class="w-12 bg-gray-50 border-l border-gray-100 flex flex-col divide-y divide-gray-100">
          <button (click)="atualizarStatus(p.id, $event)" class="flex-1 flex items-center justify-center hover:bg-blue-50 text-blue-500">
            <span>✏️</span>
          </button>
          <button (click)="excluir(p.id, $event)" class="flex-1 flex items-center justify-center hover:bg-red-50 text-red-500">
            <span>🗑️</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="erro" class="mt-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm font-bold text-center border border-red-200">
    {{ erro }}
  </div>
</div>
